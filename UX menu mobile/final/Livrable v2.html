<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Metagora · Hermès Parfum — Livrable v2</title>
<meta name="viewport" content="width=1400">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#E8E5DF; font-family: 'IBM Plex Sans', sans-serif; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="desktop-final.jsx"></script>
<script type="text/babel" src="mobile-final.jsx"></script>
<script type="text/babel" src="rotation-final.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { DesignCanvas, DCSection, DCArtboard } = window;

function App() {
  return (
    <DesignCanvas title="Metagora × Hermès — Livrable v2" subtitle="Quiet Material · Sous-titres éditorial italique">
      <DCSection id="desktop" title="01 · Desktop (1440 × 900)" subtitle="Vidéo plein cadre, card flottante à droite, sous-titres italique défilants. Réf. Variation 3B + sous-titres serif.">
        <DCArtboard id="desktop-final" label="Desktop final · Hermès Découverte Q4" width={1440} height={900}>
          <window.DesktopFinal src="assets/discovery-3.mp4" />
        </DCArtboard>
      </DCSection>

      <DCSection id="mobile" title="02 · Mobile paysage (844 × 390)" subtitle="Pattern bottom sheet : vidéo idle, handle pulsant, sheet glassmorphique. Cliquer le sheet pour l'ouvrir.">
        <DCArtboard id="mobile-final" label="Mobile final · paysage 844 × 390" width={844} height={390}>
          <window.MobileFinal src="assets/discovery-3.mp4" />
        </DCArtboard>
      </DCSection>

      <DCSection id="rotation" title="03 · Mobile portrait — Rotation prompt (390 × 844)" subtitle="Si l'utilisateur ouvre en portrait, on lui demande de tourner le téléphone. Animation de rotation auto.">
        <DCArtboard id="rotation-final" label="Mobile portrait · invitation à tourner" width={390} height={844}>
          <window.RotationFinal />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
